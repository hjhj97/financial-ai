<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ETF Strategy Dashboard</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>ETF Strategy Dashboard</h1>
        <p>
          최근 1년(또는 선택 구간) 동안 ETF 변동에 따라 전략 수익률이 어떻게 움직였는지
          시각화합니다.
        </p>
      </header>

      <section class="panel controls-panel">
        <div class="panel-head">
          <h2>Strategy Controller</h2>
          <p>값을 바꾸면 차트가 즉시 다시 계산됩니다.</p>
        </div>

        <div class="controls-grid">
          <label class="control">
            <span>
              단기 모멘텀 가중치
              <span class="tooltip-wrap" tabindex="0">
                <span class="tooltip-icon">?</span>
                <span class="tooltip-text">최근 5일 상승/하락 신호를 얼마나 더 중요하게 반영할지 정합니다. 높을수록 단기 움직임에 민감해집니다.</span>
              </span>
            </span>
            <input id="momShortWeight" type="range" min="0.1" max="0.9" step="0.05" value="0.6" />
            <strong id="momShortWeightValue">0.60</strong>
          </label>

          <label class="control">
            <span>
              리스크 패널티 강도
              <span class="tooltip-wrap" tabindex="0">
                <span class="tooltip-icon">?</span>
                <span class="tooltip-text">변동성(출렁임)이나 낙폭이 큰 ETF 점수를 얼마나 깎을지 정합니다. 높을수록 보수적으로 투자합니다.</span>
              </span>
            </span>
            <input id="riskPenaltyStrength" type="range" min="0.5" max="2.0" step="0.1" value="1.0" />
            <strong id="riskPenaltyStrengthValue">1.00</strong>
          </label>

          <label class="control">
            <span>
              GLD 헤지 틸트
              <span class="tooltip-wrap" tabindex="0">
                <span class="tooltip-icon">?</span>
                <span class="tooltip-text">금(GLD) 비중을 추가로 늘리거나 줄이는 조절값입니다. 플러스면 방어 성향, 마이너스면 공격 성향입니다.</span>
              </span>
            </span>
            <input id="gldTilt" type="range" min="-0.3" max="0.5" step="0.05" value="0.0" />
            <strong id="gldTiltValue">0.00</strong>
          </label>

          <label class="control">
            <span>
              주식 공격성 틸트 (SPY/QQQ)
              <span class="tooltip-wrap" tabindex="0">
                <span class="tooltip-icon">?</span>
                <span class="tooltip-text">SPY/QQQ 쪽 비중을 더 늘릴지 줄일지 정합니다. 높으면 주식 비중이 커져 수익/손실 변동이 함께 커집니다.</span>
              </span>
            </span>
            <input id="equityTilt" type="range" min="-0.3" max="0.3" step="0.05" value="0.0" />
            <strong id="equityTiltValue">0.00</strong>
          </label>

          <label class="control">
            <span>
              개별 ETF 최대 비중
              <span class="tooltip-wrap" tabindex="0">
                <span class="tooltip-icon">?</span>
                <span class="tooltip-text">한 ETF에 몰빵되지 않도록 상한을 둡니다. 값이 낮을수록 분산이 강해집니다.</span>
              </span>
            </span>
            <input id="maxSingle" type="range" min="0.2" max="0.6" step="0.05" value="0.4" />
            <strong id="maxSingleValue">40%</strong>
          </label>

          <label class="control">
            <span>
              SPY+QQQ 최대 합계
              <span class="tooltip-wrap" tabindex="0">
                <span class="tooltip-icon">?</span>
                <span class="tooltip-text">미국 주식(특히 성장주) 쏠림을 막기 위해 SPY와 QQQ 합계의 최대치를 제한합니다.</span>
              </span>
            </span>
            <input id="maxEquityPair" type="range" min="0.4" max="0.8" step="0.05" value="0.55" />
            <strong id="maxEquityPairValue">55%</strong>
          </label>

          <label class="control">
            <span>
              리밸런싱 주기 (거래일)
              <span class="tooltip-wrap" tabindex="0">
                <span class="tooltip-icon">?</span>
                <span class="tooltip-text">몇 거래일마다 비중을 다시 계산할지 정합니다. 짧을수록 민감하고, 길수록 완만하게 움직입니다.</span>
              </span>
            </span>
            <input id="rebalanceDays" type="range" min="3" max="10" step="1" value="5" />
            <strong id="rebalanceDaysValue">5</strong>
          </label>

          <label class="control checkbox">
            <span>
              USO 전술 편입 허용
              <span class="tooltip-wrap" tabindex="0">
                <span class="tooltip-icon">?</span>
                <span class="tooltip-text">체크하면 원유 ETF(USO)도 전략 후보에 포함합니다. 변동성이 매우 커질 수 있습니다.</span>
              </span>
            </span>
            <input id="allowUSO" type="checkbox" />
          </label>
        </div>
      </section>

      <section class="cards" id="summary-cards"></section>

      <section class="panel">
        <div class="panel-head">
          <h2>누적 수익률 지수 (기준값=100)</h2>
          <p>전략 vs SPY</p>
        </div>
        <canvas id="strategyChart"></canvas>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>ETF 가격지수 비교 (기준값=100)</h2>
          <p>SPY, QQQ, GLD, USO, EWJ</p>
        </div>
        <canvas id="etfChart"></canvas>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>주간 리밸런싱 비중</h2>
          <p>각 주차별 전략 배분 추이</p>
        </div>
        <canvas id="weightChart"></canvas>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
